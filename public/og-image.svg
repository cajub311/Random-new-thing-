<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#161a28"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Brand column -->
  <g transform="translate(72,120)">
    <!-- Stylized paw (4 toes + main pad) -->
    <g fill="url(#accent)" filter="url(#shadow)">
      <ellipse cx="96" cy="48" rx="22" ry="28"/>
      <ellipse cx="48" cy="88" rx="20" ry="26"/>
      <ellipse cx="96" cy="96" rx="20" ry="26"/>
      <ellipse cx="144" cy="88" rx="20" ry="26"/>
      <ellipse cx="96" cy="168" rx="56" ry="72"/>
    </g>
    <text x="0" y="310" fill="#e2e8f0" font-family="Segoe UI, system-ui, sans-serif" font-size="42" font-weight="700">OpenClaw</text>
    <text x="0" y="358" fill="#8892b0" font-family="Segoe UI, system-ui, sans-serif" font-size="22">Free local AI</text>
  </g>
  <!-- Chat mock (screenshot-style) -->
  <g transform="translate(400,64)">
    <rect width="728" height="502" rx="20" fill="#12151f" stroke="#2e3250" stroke-width="2" filter="url(#shadow)"/>
    <rect x="24" y="20" width="680" height="36" rx="8" fill="#1a1d27"/>
    <circle cx="44" cy="38" r="6" fill="#ef4444"/>
    <circle cx="64" cy="38" r="6" fill="#f59e0b"/>
    <circle cx="84" cy="38" r="6" fill="#22c55e"/>
    <!-- Assistant -->
    <rect x="32" y="88" width="420" height="72" rx="14" fill="#1a1d27" stroke="#2e3250"/>
    <rect x="48" y="104" width="120" height="10" rx="4" fill="#2e3250"/>
    <rect x="48" y="124" width="360" height="10" rx="4" fill="#2e3250"/>
    <rect x="48" y="142" width="280" height="10" rx="4" fill="#2e3250"/>
    <!-- User -->
    <rect x="276" y="188" width="420" height="52" rx="14" fill="#1e2a4a" stroke="#2d4a8a"/>
    <rect x="292" y="206" width="300" height="10" rx="4" fill="#3d4f7a"/>
    <rect x="292" y="222" width="200" height="10" rx="4" fill="#3d4f7a"/>
    <!-- Assistant reply -->
    <rect x="32" y="268" width="480" height="88" rx="14" fill="#1a1d27" stroke="#2e3250"/>
    <rect x="48" y="284" width="200" height="10" rx="4" fill="#2e3250"/>
    <rect x="48" y="304" width="440" height="10" rx="4" fill="#2e3250"/>
    <rect x="48" y="324" width="400" height="10" rx="4" fill="#2e3250"/>
    <rect x="48" y="336" width="320" height="10" rx="4" fill="#2e3250"/>
    <!-- Typing dots -->
    <circle cx="60" cy="400" r="6" fill="#6c63ff" opacity="0.9"/>
    <circle cx="84" cy="400" r="6" fill="#6c63ff" opacity="0.6"/>
    <circle cx="108" cy="400" r="6" fill="#6c63ff" opacity="0.35"/>
  </g>
</svg>
