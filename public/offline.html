<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#0b1020" />
  <title>OpenClaw — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: system-ui, sans-serif;
      background: #0b1020;
      color: #e2e8f0;
      text-align: center;
    }
    h1 { font-size: 1.5rem; margin-bottom: 12px; }
    p { color: #8892b0; line-height: 1.6; max-width: 320px; margin: 0 auto 20px; }
    a {
      display: inline-block;
      padding: 12px 24px;
      background: #6c63ff;
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div>
    <div style="font-size:3rem;margin-bottom:8px">🐾</div>
    <h1>You are offline</h1>
    <p>OpenClaw can still open with your last cached provider list after you have visited online once.</p>
    <a href="/">Try again</a>
  </div>
</body>
</html>
